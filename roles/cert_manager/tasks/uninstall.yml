---
- name: Delete cert-manager HelmChart
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    state: absent
    api_version: helm.cattle.io/v1
    kind: HelmChart
    namespace: "{{ cert_manager_helmchart_namespace }}"
    name: "{{ cert_manager_release_name }}"
    wait: true
    wait_timeout: "{{ dev_infra_deployment_long_wait_timeout_seconds }}"
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Delete residual cert-manager Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_uninstall
  vars:
    dev_infra_deployment_helm_release_name: "{{ cert_manager_release_name }}"
    dev_infra_deployment_helm_namespace: "{{ cert_manager_namespace }}"

- name: Delete cert-manager namespace
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_namespace
  vars:
    dev_infra_deployment_delete_namespace: "{{ cert_manager_namespace }}"

- name: Delete unused cert-manager CustomResourceDefinitions
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_crds
  vars:
    dev_infra_deployment_delete_crd_names: "{{ cert_manager_crd_names }}"
    dev_infra_deployment_delete_crd_allowed_namespaces:
      - "{{ cert_manager_namespace }}"
      - "{{ dev_infra_deployment_namespace | default('gabiacloud-s3') }}"
      - "{{ apisix_namespace | default('apisix') }}"
    dev_infra_deployment_delete_crd_allowed_cluster_names:
      - "{{ acme_dns01_issuer_name | default('letsencrypt-cloudflare-dns01') }}"
      - "{{ internal_pki_issuer_name | default('root-tls-ca') }}"
