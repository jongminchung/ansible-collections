---
- name: Resolve ExternalDNS role request state
  ansible.builtin.set_fact:
    external_dns_role_requested: >-
      {{
        ((ansible_run_tags | default(['all']))
        | intersect(['all', 'external_dns', 'dns', 'gateway_api'])
        | length) > 0
      }}
  tags: [always]

- name: Validate ExternalDNS settings
  ansible.builtin.assert:
    that:
      - external_dns_namespace | length > 0
      - external_dns_release_name | length > 0
      - external_dns_chart_ref | length > 0
      - external_dns_chart_repo_name | length > 0
      - external_dns_chart_repo_url | length > 0
      - external_dns_provider_name == 'cloudflare'
      - external_dns_domain_filters is iterable
      - external_dns_domain_filters is not string
      - external_dns_domain_filters | length > 0
      - external_dns_sources is iterable
      - external_dns_sources is not string
      - external_dns_sources | length > 0
      - external_dns_cloudflare_api_token | length > 0
      - external_dns_cloudflare_zone_id | length > 0
    fail_msg: ExternalDNS role settings are invalid.
  no_log: true
  when: external_dns_role_requested | bool
  tags: [always, validate]

- name: Resolve ExternalDNS Helm values
  ansible.builtin.set_fact:
    external_dns_helm_values_resolved: >-
      {{
        external_dns_helm_values
        | combine(
          {
            'provider': {'name': external_dns_provider_name},
            'sources': external_dns_sources,
            'domainFilters': external_dns_domain_filters,
            'txtOwnerId': external_dns_txt_owner_id,
            'policy': 'upsert-only',
            'registry': 'txt',
            'extraArgs': {
              'gateway-name': external_dns_gateway_name,
              'gateway-namespace': external_dns_gateway_namespace,
              'zone-id-filter': external_dns_cloudflare_zone_id,
              'cloudflare-dns-records-per-page': external_dns_cloudflare_dns_records_per_page,
              'cloudflare-proxied': external_dns_cloudflare_proxied | bool
            }
            | combine(external_dns_extra_args)
            | combine(
                {'cloudflare-record-comment': external_dns_cloudflare_record_comment}
                if (external_dns_cloudflare_record_comment | length > 0) else {}
              ),
            'env': [
              {
                'name': 'CF_API_TOKEN',
                'valueFrom': {
                  'secretKeyRef': {
                    'name': external_dns_cloudflare_secret_name,
                    'key': 'api-token'
                  }
                }
              }
            ]
          },
          recursive=true
        )
      }}
  no_log: true
  when: external_dns_role_requested | bool

- name: Check ExternalDNS Cloudflare DNS record API access
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{
      external_dns_cloudflare_zone_id }}/dns_records?per_page=1
    validate_certs: "{{ external_dns_cloudflare_api_validate_certs | bool }}"
    method: GET
    headers:
      Authorization: "Bearer {{ external_dns_cloudflare_api_token }}"
      Content-Type: application/json
    return_content: true
    status_code: 200
  register: external_dns_cloudflare_dns_records_access
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - external_dns_role_requested | bool
    - not ansible_check_mode
  delegate_to: localhost
  become: false
  run_once: true

- name: Validate ExternalDNS Cloudflare DNS record API access
  ansible.builtin.assert:
    that:
      - external_dns_cloudflare_dns_records_access.status == 200
      - external_dns_cloudflare_dns_records_access.json.success | default(false) | bool
    fail_msg: >-
      The Cloudflare API token must read and edit DNS records for zone
      {{ external_dns_cloudflare_zone_id }}.
  when:
    - external_dns_role_requested | bool
    - not ansible_check_mode

- name: Ensure ExternalDNS namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ external_dns_namespace }}"
  when: external_dns_role_requested | bool

- name: Apply ExternalDNS Cloudflare token Secret
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ external_dns_cloudflare_secret_name }}"
        namespace: "{{ external_dns_namespace }}"
      type: Opaque
      stringData:
        api-token: "{{ external_dns_cloudflare_api_token }}"
    dev_infra_deployment_apply_server_side: false
    dev_infra_deployment_apply_no_log: true
  no_log: true
  when: external_dns_role_requested | bool

- name: Configure ExternalDNS Helm repository
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_repo
  vars:
    dev_infra_deployment_helm_repo_name: "{{ external_dns_chart_repo_name }}"
    dev_infra_deployment_helm_repo_url: "{{ external_dns_chart_repo_url }}"
  when: external_dns_role_requested | bool

- name: Install or upgrade ExternalDNS
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_release
  vars:
    dev_infra_deployment_helm_release_name: "{{ external_dns_release_name }}"
    dev_infra_deployment_helm_chart_ref: "{{ external_dns_chart_ref }}"
    dev_infra_deployment_helm_namespace: "{{ external_dns_namespace }}"
    dev_infra_deployment_helm_release_values: "{{ external_dns_helm_values_resolved }}"
    dev_infra_deployment_helm_wait: true
    dev_infra_deployment_helm_no_log: true
  no_log: true
  when: external_dns_role_requested | bool

- name: Wait for ExternalDNS rollout
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ external_dns_namespace }}"
    dev_infra_deployment_rollout_resource: "deployment/{{ external_dns_release_name }}"
    dev_infra_deployment_rollout_timeout_seconds: 180
  when: external_dns_role_requested | bool
