---
- name: Validate inline Dashboard credential
  ansible.builtin.assert:
    that:
      - opensearch_dashboard_password | string | length > 0
  no_log: true

- name: Resolve Dashboard Helm values
  ansible.builtin.set_fact:
    dev_infra_deployment_dashboard_release_values: >-
      {{
        (lookup('ansible.builtin.file', role_path ~ '/files/k8s/values.yaml') | from_yaml)
        | combine(
            lookup('ansible.builtin.template', role_path ~ '/templates/values-secret.yaml.j2')
            | from_yaml,
            recursive=true
          )
      }}
  no_log: true

- name: Resolve Dashboard Kubernetes definitions
  ansible.builtin.set_fact:
    dev_infra_deployment_dashboard_local_definitions: >-
      {{
        (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/httproute.yaml')
         | from_yaml_all | reject('equalto', none) | list)
        + (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/networkpolicy.yaml')
           | from_yaml_all | reject('equalto', none) | list)
        + (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/pdb.yaml')
           | from_yaml_all | reject('equalto', none) | list)
      }}

- name: Delete stale Dashboard TLS resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_dashboard_stale_tls_resources }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Configure OpenSearch Helm repository for Dashboard
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_repo
  vars:
    dev_infra_deployment_helm_repo_name: "{{ dev_infra_deployment_dashboard_repo_name }}"
    dev_infra_deployment_helm_repo_url: "{{ dev_infra_deployment_dashboard_repo_url }}"

- name: Install or upgrade Dashboard Helm release
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: helm_release
  vars:
    dev_infra_deployment_helm_release_name: "{{ dev_infra_deployment_dashboard_release_name }}"
    dev_infra_deployment_helm_chart_ref: "{{ dev_infra_deployment_dashboard_chart_ref }}"
    dev_infra_deployment_helm_chart_version: "{{ dev_infra_deployment_dashboard_chart_version }}"
    dev_infra_deployment_helm_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_helm_release_values:
      "{{ dev_infra_deployment_dashboard_release_values }}"
    dev_infra_deployment_helm_wait: true
    dev_infra_deployment_helm_timeout: "{{ dev_infra_deployment_dashboard_timeout }}"
    dev_infra_deployment_helm_no_log: true
  no_log: true

- name: Check APISIX CRD before stale Dashboard route cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: apisixroutes.apisix.apache.org
  register: dev_infra_deployment_apisix_route_crd
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete stale Dashboard APISIX CRD routes
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop:
    - api_version: apisix.apache.org/v2
      kind: ApisixRoute
      name: opensearch-dashboard
    - api_version: apisix.apache.org/v2
      kind: ApisixUpstream
      name: opensearch-dashboard
    - api_version: apisix.apache.org/v2
      kind: ApisixTls
      name: opensearch-dashboard
  when: dev_infra_deployment_apisix_route_crd.resources | length > 0
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Check APISIX BackendTrafficPolicy CRD before stale Dashboard backend cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: backendtrafficpolicies.apisix.apache.org
  register: dev_infra_deployment_apisix_backend_policy_crd
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Delete stale Dashboard local resources
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    namespace: "{{ dev_infra_deployment_namespace }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ dev_infra_deployment_dashboard_stale_local_resources }}"
  when:
    - item.kind != 'BackendTrafficPolicy' or
      dev_infra_deployment_apisix_backend_policy_crd.resources | length > 0
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"

- name: Apply Dashboard local manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      "{{ dev_infra_deployment_dashboard_local_definitions }}"
    dev_infra_deployment_apply_server_side: true
    dev_infra_deployment_apply_field_manager: "{{ dev_infra_deployment_dashboard_field_manager }}"

- name: Verify Dashboard after install
  ansible.builtin.import_tasks: verify.yml
