---
- name: Validate local-path provisioner settings
  ansible.builtin.assert:
    that:
      - local_path_provisioner_version | length > 0
      - local_path_provisioner_manifest_url | length > 0
      - local_path_provisioner_namespace | length > 0
      - local_path_provisioner_deployment_name | length > 0
      - local_path_provisioner_storage_class | length > 0
    fail_msg: local-path provisioner role settings are invalid.
  tags: [always, validate]

- name: Apply local-path provisioner manifest
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_url: "{{ local_path_provisioner_manifest_url }}"
    dev_infra_deployment_apply_server_side: false

- name: Read local-path StorageClass
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: resource_info
  vars:
    dev_infra_deployment_resource_api_version: storage.k8s.io/v1
    dev_infra_deployment_resource_kind: StorageClass
    dev_infra_deployment_resource_name: "{{ local_path_provisioner_storage_class }}"

- name: Configure local-path as default StorageClass
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: patch_resource
  vars:
    dev_infra_deployment_patch_api_version: storage.k8s.io/v1
    dev_infra_deployment_patch_kind: StorageClass
    dev_infra_deployment_patch_name: "{{ local_path_provisioner_storage_class }}"
    dev_infra_deployment_patch_definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  when:
    - local_path_provisioner_default_class | bool
    - dev_infra_deployment_resource_info_result.resources | length > 0
    - >-
      dev_infra_deployment_resource_info_result.resources[0].metadata.annotations[
      'storageclass.kubernetes.io/is-default-class'] | default('false') != 'true'

- name: Wait for local-path provisioner rollout
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ local_path_provisioner_namespace }}"
    dev_infra_deployment_rollout_resource: "deployment/{{ local_path_provisioner_deployment_name }}"
    dev_infra_deployment_rollout_timeout_seconds:
      "{{ local_path_provisioner_wait_timeout | regex_replace('s$', '') | int }}"
