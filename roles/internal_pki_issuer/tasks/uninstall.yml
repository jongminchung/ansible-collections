---
- name: Check cert-manager ClusterIssuer CRD before internal PKI cleanup
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clusterissuers.cert-manager.io
  register: internal_pki_issuer_crd_info
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  changed_when: false

- name: Resolve internal PKI issuer definitions for deletion
  ansible.builtin.set_fact:
    internal_pki_issuer_delete_definitions: >-
      {{
        lookup('ansible.builtin.template', role_path ~ '/templates/issuer.yaml.j2')
        | from_yaml_all | reject('equalto', none)
        | rejectattr('kind', 'equalto', 'ClusterIssuer')
        | list
      }}

- name: Include internal PKI ClusterIssuer in deletion plan
  ansible.builtin.set_fact:
    internal_pki_issuer_delete_definitions: >-
      {{
        internal_pki_issuer_delete_definitions
        + (
            lookup('ansible.builtin.template', role_path ~ '/templates/issuer.yaml.j2')
            | from_yaml_all | reject('equalto', none)
            | selectattr('kind', 'equalto', 'ClusterIssuer') | list
          )
      }}
  when: internal_pki_issuer_crd_info.resources | length > 0

- name: Delete internal PKI issuer resources
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_definitions: "{{ internal_pki_issuer_delete_definitions }}"
    dev_infra_deployment_delete_wait_timeout: "{{ internal_pki_issuer_wait_timeout_seconds }}"
