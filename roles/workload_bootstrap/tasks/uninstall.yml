---
- name: Resolve workload bootstrap definitions for deletion
  ansible.builtin.set_fact:
    dev_infra_deployment_workload_bootstrap_delete_definitions: >-
      {{
        (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/bootstrap-bin-configmap.yaml')
         | from_yaml_all | reject('equalto', none) | list)
        + (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/rbac.yaml')
           | from_yaml_all | reject('equalto', none) | list)
      }}

- name: Delete workload bootstrap Jobs
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_labelled
  vars:
    dev_infra_deployment_delete_kind: Job
    dev_infra_deployment_delete_namespace: "{{ dev_infra_deployment_namespace }}"
    dev_infra_deployment_delete_label_selectors:
      - app.kubernetes.io/name=helm-bootstrap

- name: Delete workload bootstrap manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_definitions:
      "{{ dev_infra_deployment_workload_bootstrap_delete_definitions }}"

- name: Delete application namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ dev_infra_deployment_namespace }}"
    wait: true
    wait_timeout: "{{ dev_infra_deployment_long_wait_timeout_seconds }}"
  vars:
    ansible_python_interpreter: "{{ dev_infra_deployment_python_interpreter }}"
