---
- name: Resolve workload bootstrap definitions
  ansible.builtin.set_fact:
    dev_infra_deployment_workload_bootstrap_definitions: >-
      {{
        (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/bootstrap-bin-configmap.yaml')
         | from_yaml_all | reject('equalto', none) | list)
        + (lookup('ansible.builtin.file', role_path ~ '/files/k8s/manifests/rbac.yaml')
           | from_yaml_all | reject('equalto', none) | list)
      }}

- name: Ensure application namespace exists
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: ensure_namespace
  vars:
    dev_infra_deployment_target_namespace: "{{ dev_infra_deployment_namespace }}"

- name: Apply workload bootstrap manifests
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: apply_manifest
  vars:
    dev_infra_deployment_apply_definitions:
      "{{ dev_infra_deployment_workload_bootstrap_definitions }}"
    dev_infra_deployment_apply_server_side: false
