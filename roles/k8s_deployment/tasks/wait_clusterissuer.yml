---
- name: Skip ClusterIssuer root-tls-ca readiness wait in check mode
  ansible.builtin.debug:
    msg:
      "Skipping ClusterIssuer root-tls-ca readiness wait because check mode does not apply dependent
      resources."
  when: ansible_check_mode
  delegate_to: localhost
  become: false
  run_once: true

- name: Wait for ClusterIssuer root-tls-ca
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: root-tls-ca
  register: dev_infra_deployment_clusterissuer_wait
  until: >
    (dev_infra_deployment_clusterissuer_wait.resources | length > 0) and
    (((dev_infra_deployment_clusterissuer_wait.resources[0].status.conditions | default([])) |
    selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list |
    length) > 0)
  retries:
    "{{ ((dev_infra_deployment_clusterissuer_timeout_seconds |
    default(dev_infra_deployment_wait_timeout_seconds)) | int / 5) | round(0, 'ceil') | int }}"
  delay: 5
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  when: not ansible_check_mode
  delegate_to: localhost
  become: false
  run_once: true
