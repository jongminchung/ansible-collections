---
- name: Delete Kubernetes definitions from the Ansible control node
  block:
    - name: Initialize Kubernetes definitions to delete
      ansible.builtin.set_fact:
        dev_infra_deployment_delete_definitions_resolved: >-
          {{
            (
              dev_infra_deployment_delete_definitions
              if (dev_infra_deployment_delete_definitions is sequence and
                  dev_infra_deployment_delete_definitions is not mapping and
                  dev_infra_deployment_delete_definitions is not string)
              else [dev_infra_deployment_delete_definitions]
            )
            if (dev_infra_deployment_delete_definitions is defined)
            else []
          }}

    - name: Resolve Kubernetes definition files to delete
      ansible.builtin.set_fact:
        dev_infra_deployment_delete_definitions_resolved: >-
          {{
            dev_infra_deployment_delete_definitions_resolved
            + (lookup('ansible.builtin.file', item) | from_yaml_all | reject('equalto', none) | list)
          }}
      loop: "{{ dev_infra_deployment_delete_files | default([]) }}"

    - name: Delete Kubernetes definitions
      kubernetes.core.k8s:
        kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
        state: absent
        definition: "{{ item }}"
        wait: "{{ dev_infra_deployment_delete_wait | default(true) | bool }}"
        wait_timeout: >-
          {{
            dev_infra_deployment_delete_wait_timeout
            | default(dev_infra_deployment_wait_timeout_seconds)
          }}
      loop: "{{ dev_infra_deployment_delete_definitions_resolved }}"
  delegate_to: localhost
  become: false
  run_once: true
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
