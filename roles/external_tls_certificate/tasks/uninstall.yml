---
- name: Resolve {{ external_tls_certificate_label }} uninstall request state
  ansible.builtin.set_fact:
    external_tls_certificate_uninstall_requested: >-
      {{
        ((ansible_run_tags | default(['all']))
        | intersect(external_tls_certificate_request_tags) | length) > 0
      }}
  tags: [always]

- name: Validate {{ external_tls_certificate_label }} uninstall settings
  ansible.builtin.assert:
    that:
      - external_tls_certificate_namespace | length > 0
      - external_tls_certificate_name | length > 0
      - external_tls_certificate_secret_name | length > 0
      - external_tls_certificate_cloudflare_api_token | length > 0
      - external_tls_certificate_cloudflare_zone_id | length > 0
      - external_tls_certificate_dns_records | length > 0
      - external_tls_certificate_dns_target | length > 0
      - external_tls_certificate_cloudflare_record_comment | length > 0
    fail_msg: "{{ external_tls_certificate_label }} uninstall settings are invalid."
  no_log: true
  when: external_tls_certificate_uninstall_requested | bool

- name: Lookup {{ external_tls_certificate_label }} Cloudflare DNS records for deletion
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{ external_tls_certificate_cloudflare_zone_id
      }}/dns_records?type={{ external_tls_certificate_dns_record_type }}&name={{ item | urlencode }}
    validate_certs: "{{ external_tls_certificate_cloudflare_api_validate_certs | bool }}"
    method: GET
    headers:
      Authorization: "Bearer {{ external_tls_certificate_cloudflare_api_token }}"
      Content-Type: application/json
    return_content: true
    status_code: 200
  register: external_tls_certificate_uninstall_dns_lookup
  changed_when: false
  check_mode: false
  no_log: true
  loop: "{{ external_tls_certificate_dns_records }}"
  when: external_tls_certificate_uninstall_requested | bool

- name: Verify {{ external_tls_certificate_label }} Cloudflare DNS record ownership
  ansible.builtin.assert:
    that:
      - item.json.success | default(false) | bool
      - >-
        item.json.result | selectattr('comment', 'defined')
        | selectattr('comment', 'equalto', external_tls_certificate_cloudflare_record_comment)
        | list | length == item.json.result | length
      - >-
        item.json.result | selectattr('content', 'equalto', external_tls_certificate_dns_target)
        | list | length == item.json.result | length
    fail_msg: >-
      Cloudflare DNS record {{ item.item }} is not exclusively owned by
      {{ external_tls_certificate_label }}.
  no_log: true
  loop: "{{ external_tls_certificate_uninstall_dns_lookup.results | default([]) }}"
  when: external_tls_certificate_uninstall_requested | bool

- name: Delete owned {{ external_tls_certificate_label }} Cloudflare DNS records
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{ external_tls_certificate_cloudflare_zone_id
      }}/dns_records/{{ item.1.id }}
    validate_certs: "{{ external_tls_certificate_cloudflare_api_validate_certs | bool }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ external_tls_certificate_cloudflare_api_token }}"
      Content-Type: application/json
    return_content: true
    status_code: 200
  changed_when: true
  no_log: true
  loop: >-
    {{
      external_tls_certificate_uninstall_dns_lookup.results | default([])
      | subelements('json.result', skip_missing=True)
    }}
  when:
    - external_tls_certificate_uninstall_requested | bool
    - not ansible_check_mode

- name: Read Certificate CustomResourceDefinition availability
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: certificates.cert-manager.io
  register: external_tls_certificate_crd_info
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  changed_when: false
  when: external_tls_certificate_uninstall_requested | bool

- name: Resolve {{ external_tls_certificate_label }} Kubernetes resources for deletion
  ansible.builtin.set_fact:
    external_tls_certificate_delete_definitions: >-
      {{
        [
          {
            'apiVersion': 'v1',
            'kind': 'Secret',
            'metadata': {
              'name': external_tls_certificate_secret_name,
              'namespace': external_tls_certificate_namespace
            }
          }
        ]
        + ([lookup('ansible.builtin.template', role_path ~ '/templates/certificate.yaml.j2') | from_yaml]
           if (external_tls_certificate_crd_info.resources | length > 0) else [])
      }}
  when: external_tls_certificate_uninstall_requested | bool

- name: Delete {{ external_tls_certificate_label }} Kubernetes resources
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: delete_manifest
  vars:
    dev_infra_deployment_delete_definitions: "{{ external_tls_certificate_delete_definitions }}"
  when: external_tls_certificate_uninstall_requested | bool
