---
- name: Verify NFS CSI controller rollout
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ csi_driver_nfs_namespace }}"
    dev_infra_deployment_rollout_resource: "deployment/{{ csi_driver_nfs_controller_name }}"
    dev_infra_deployment_rollout_timeout_seconds: "{{ csi_driver_nfs_timeout_seconds }}"

- name: Verify NFS CSI node rollout
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: rollout_status
  vars:
    dev_infra_deployment_rollout_namespace: "{{ csi_driver_nfs_namespace }}"
    dev_infra_deployment_rollout_resource: "daemonset/{{ csi_driver_nfs_node_name }}"
    dev_infra_deployment_rollout_timeout_seconds: "{{ csi_driver_nfs_timeout_seconds }}"

- name: Read NFS StorageClass
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: resource_info
  vars:
    dev_infra_deployment_resource_api_version: storage.k8s.io/v1
    dev_infra_deployment_resource_kind: StorageClass
    dev_infra_deployment_resource_name: "{{ dev_infra_deployment_storage_class }}"
  when: not ansible_check_mode

- name: Verify NFS StorageClass settings and ownership
  ansible.builtin.assert:
    that:
      - dev_infra_deployment_resource_info_result.resources | length == 1
      - csi_driver_nfs_storage_class.provisioner == csi_driver_nfs_driver_name
      - csi_driver_nfs_storage_class.reclaimPolicy == csi_driver_nfs_reclaim_policy
      - csi_driver_nfs_storage_class.volumeBindingMode == 'Immediate'
      - csi_driver_nfs_storage_class.allowVolumeExpansion | bool
      - csi_driver_nfs_storage_class.parameters.server == csi_driver_nfs_server
      - csi_driver_nfs_storage_class.parameters.share == csi_driver_nfs_share
      - csi_driver_nfs_storage_class.parameters.subDir == csi_driver_nfs_sub_dir
      - csi_driver_nfs_storage_class.parameters.mountPermissions == csi_driver_nfs_mount_permissions
      - csi_driver_nfs_storage_class.parameters.onDelete == csi_driver_nfs_on_delete
      - >-
        csi_driver_nfs_storage_class.parameters[
          'csi.storage.k8s.io/provisioner-secret-name']
        == csi_driver_nfs_mount_options_secret_name
      - >-
        csi_driver_nfs_storage_class.parameters[
          'csi.storage.k8s.io/provisioner-secret-namespace']
        == csi_driver_nfs_namespace
      - >-
        csi_driver_nfs_storage_class.mountOptions | default([])
        | difference(csi_driver_nfs_mount_options) | length == 0
      - >-
        csi_driver_nfs_mount_options
        | difference(csi_driver_nfs_storage_class.mountOptions | default([])) | length == 0
      - >-
        csi_driver_nfs_storage_class.metadata.labels['dev-infra.deployment/ownership']
        | default('') == 'exclusive'
      - >-
        csi_driver_nfs_storage_class.metadata.annotations['meta.helm.sh/release-name']
        | default('') == csi_driver_nfs_release_name
      - >-
        csi_driver_nfs_storage_class.metadata.annotations['meta.helm.sh/release-namespace']
        | default('') == csi_driver_nfs_namespace
      - >-
        csi_driver_nfs_storage_class.metadata.annotations[
          'storageclass.kubernetes.io/is-default-class'] | default('false')
        == (csi_driver_nfs_default_class | bool | ternary('true', 'false'))
    fail_msg: NFS StorageClass is missing or does not match the requested configuration.
  vars:
    csi_driver_nfs_storage_class:
      "{{ (dev_infra_deployment_resource_info_result.resources | first) | default({}, true) }}"
  when: not ansible_check_mode

- name: Read NFS CSI controller mount options Secret
  kubernetes.core.k8s_info:
    kubeconfig: "{{ dev_infra_deployment_control_node_kubeconfig_path }}"
    api_version: v1
    kind: Secret
    namespace: "{{ csi_driver_nfs_namespace }}"
    name: "{{ csi_driver_nfs_mount_options_secret_name }}"
  register: csi_driver_nfs_mount_options_secret_info
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  changed_when: false
  no_log: true
  when: not ansible_check_mode

- name: Verify NFS CSI controller mount options Secret
  ansible.builtin.assert:
    that:
      - csi_driver_nfs_mount_options_secret_info.resources | length == 1
      - >-
        csi_driver_nfs_mount_options_secret.metadata.labels[
          'app.kubernetes.io/managed-by'] | default('') == 'dev-infra-deployment'
      - >-
        csi_driver_nfs_mount_options_secret.metadata.labels[
          'dev-infra.deployment/ownership'] | default('') == 'exclusive'
      - >-
        csi_driver_nfs_mount_options_secret.data.mountOptions | b64decode
        == csi_driver_nfs_mount_options | join(',')
    fail_msg: NFS CSI controller mount options Secret is missing or invalid.
  vars:
    csi_driver_nfs_mount_options_secret: >-
      {{ (csi_driver_nfs_mount_options_secret_info.resources | first) | default({}, true) }}
  no_log: true
  when: not ansible_check_mode

- name: Read NFS CSIDriver
  ansible.builtin.include_role:
    name: dev_infra.deployment.k8s_deployment
    tasks_from: resource_info
  vars:
    dev_infra_deployment_resource_api_version: storage.k8s.io/v1
    dev_infra_deployment_resource_kind: CSIDriver
    dev_infra_deployment_resource_name: "{{ csi_driver_nfs_driver_name }}"
  when: not ansible_check_mode

- name: Verify NFS CSIDriver ownership
  ansible.builtin.assert:
    that:
      - dev_infra_deployment_resource_info_result.resources | length == 1
      - >-
        csi_driver_nfs_driver.metadata.annotations['meta.helm.sh/release-name']
        | default('') == csi_driver_nfs_release_name
      - >-
        csi_driver_nfs_driver.metadata.annotations['meta.helm.sh/release-namespace']
        | default('') == csi_driver_nfs_namespace
    fail_msg: NFS CSIDriver is missing or is not Collection-owned.
  vars:
    csi_driver_nfs_driver:
      "{{ (dev_infra_deployment_resource_info_result.resources | first) | default({}, true) }}"
  when: not ansible_check_mode
